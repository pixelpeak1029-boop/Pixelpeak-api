<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PixelPeak - Kategori Detay</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            background-color: #141414;
            color: #fff;
        }
        .header {
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            background-color: #0b0b0b;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .back-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: #e50914;
            color: white;
            border: none;
            font-size: 20px;
            cursor: pointer;
        }
        .category-title {
            font-size: 24px;
            font-weight: bold;
        }
        .content-grid {
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px;
        }
        .card {
            cursor: pointer;
            transition: transform 0.2s;
        }
        .card:hover {
            transform: scale(1.05);
        }
        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 8px;
            border: 2px solid #333;
        }
        .card-title {
            margin-top: 8px;
            font-size: 14px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .card-meta {
            display: flex;
            gap: 10px;
            font-size: 12px;
            color: #aaa;
            margin-top: 4px;
        }
        .rating {
            color: #46d369;
            font-weight: 600;
        }
        .loading {
            text-align: center;
            padding: 50px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="header">
        <button class="back-btn" onclick="history.back()">←</button>
        <div class="category-title" id="categoryName">Yükleniyor...</div>
    </div>
    <div class="content-grid" id="contentGrid">
        <div class="loading">Yükleniyor...</div>
    </div>

    <script>
        const API_URL = 'https://pixelpeak-api.onrender.com/api';
        
        async function loadCategoryContent() {
            const urlParams = new URLSearchParams(window.location.search);
            const genreId = urlParams.get('id');
            const type = urlParams.get('type'); // 'movie' veya 'tv'
            const name = urlParams.get('name');
            
            document.getElementById('categoryName').textContent = name + ' ' + (type === 'movie' ? 'Filmleri' : 'Dizileri');
            
            try {
                const response = await fetch(`${API_URL}/${type}s/category/${genreId}`);
                const items = await response.json();
                
                const grid = document.getElementById('contentGrid');
                grid.innerHTML = '';
                
                items.slice(0, 30).forEach(item => {
                    const posterPath = item.poster_path 
                        ? `https://image.tmdb.org/t/p/w200${item.poster_path}`
                        : 'https://via.placeholder.com/150x200/333/666?text=No+Image';
                    
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.onclick = () => window.location.href = `detay.html?id=${item.id}&type=${type}`;
                    card.innerHTML = `
                        <img src="${posterPath}" alt="${item.title || item.name}">
                        <div class="card-title">${item.title || item.name}</div>
                        <div class="card-meta">
                            <span class="rating">${Math.round((item.vote_average || 0) * 10)}%</span>
                            <span>${(item.release_date || item.first_air_date || '').substring(0, 4)}</span>
                        </div>
                    `;
                    grid.appendChild(card);
                });
                
            } catch (error) {
                console.error('Kategori içeriği hatası:', error);
                document.getElementById('contentGrid').innerHTML = '<div class="loading">Hata oluştu</div>';
            }
        }
        
        loadCategoryContent();
    </script>
</body>
</html>
