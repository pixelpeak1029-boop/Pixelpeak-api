<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PixelPeak - Kullanıcılar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        body {
            background: #141414;
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #333;
        }

        .logo {
            font-size: 32px;
            font-weight: bold;
            color: #e50914;
        }

        .logo span {
            color: #fff;
            font-size: 16px;
            margin-left: 10px;
        }

        .back-btn {
            background: #e50914;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 4px;
            font-weight: 600;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #1f1f1f;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            border-left: 4px solid #e50914;
        }

        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: #e50914;
        }

        .stat-label {
            color: #aaa;
            margin-top: 5px;
        }

        .user-table {
            background: #1f1f1f;
            border-radius: 8px;
            overflow: hidden;
        }

        .table-header {
            display: grid;
            grid-template-columns: 80px 1fr 1.5fr 1fr;
            background: #333;
            padding: 15px;
            font-weight: 600;
            color: #e50914;
        }

        .user-row {
            display: grid;
            grid-template-columns: 80px 1fr 1.5fr 1fr;
            padding: 15px;
            border-bottom: 1px solid #333;
            align-items: center;
        }

        .user-row:hover {
            background: #2a2a2a;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            background: #e50914;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .user-email {
            color: #fff;
            word-break: break-all;
        }

        .user-password {
            font-family: monospace;
            color: #46d369;
            font-size: 12px;
            word-break: break-all;
            padding-right: 10px;
        }

        .password-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .toggle-password {
            background: none;
            border: 1px solid #e50914;
            color: #e50914;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        .toggle-password:hover {
            background: #e50914;
            color: white;
        }

        .copy-btn {
            background: none;
            border: 1px solid #46d369;
            color: #46d369;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        .copy-btn:hover {
            background: #46d369;
            color: white;
        }

        .refresh-btn {
            background: #e50914;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .warning {
            background: rgba(229, 9, 20, 0.2);
            border: 1px solid #e50914;
            color: #e50914;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }

        .footer {
            margin-top: 30px;
            text-align: center;
            color: #666;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                PIXELPEAK
                <span>kullanıcı listesi</span>
            </div>
            <a href="/login.html" class="back-btn">← Girişe Dön</a>
        </div>

        <div class="warning">
            ⚠️ BU SAYFADA TÜM KULLANICILARIN ŞİFRELERİ GÖRÜNÜR! ⚠️
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <button class="refresh-btn" onclick="loadUsers()">🔄 Yenile</button>
            <div id="lastUpdate"></div>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="totalUsers">0</div>
                <div class="stat-label">Toplam Kullanıcı</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="todayUsers">0</div>
                <div class="stat-label">Bugün Kayıt</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="avgPassword">-</div>
                <div class="stat-label">Ort. Şifre Uzunluğu</div>
            </div>
        </div>

        <div class="user-table" id="userTable">
            <div class="table-header">
                <div></div>
                <div>Email</div>
                <div>Şifre (düz metin)</div>
                <div>Kayıt Tarihi</div>
            </div>
            <div id="userList">
                <!-- Kullanıcılar buraya yüklenecek -->
            </div>
        </div>

        <div class="footer">
            © 2024 PixelPeak - Sadece geliştirici gözüyle
        </div>
    </div>

    <script>
        const API_URL = 'https://pixelpeak-api.onrender.com/api';

        async function loadUsers() {
            try {
                const response = await fetch(`${API_URL}/all-users`);
                const users = await response.json();
                
                displayUsers(users);
                updateStats(users);
                document.getElementById('lastUpdate').innerHTML = `Son güncelleme: ${new Date().toLocaleString()}`;
            } catch (error) {
                document.getElementById('userList').innerHTML = `
                    <div style="padding: 40px; text-align: center; color: #e50914;">
                        ❌ Kullanıcılar yüklenemedi! API çalışıyor mu?
                    </div>
                `;
            }
        }

        function displayUsers(users) {
            const userList = document.getElementById('userList');
            
            if (users.length === 0) {
                userList.innerHTML = `
                    <div style="padding: 40px; text-align: center; color: #666;">
                        Henüz hiç kullanıcı yok.
                    </div>
                `;
                return;
            }

            let html = '';
            users.forEach((user, index) => {
                const date = new Date(user.createdAt).toLocaleString('tr-TR');
                html += `
                    <div class="user-row">
                        <div class="user-avatar">${user.avatar || '👤'}</div>
                        <div class="user-email">${user.email}</div>
                        <div class="password-container">
                            <span class="user-password" id="pass-${index}">${user.password}</span>
                            <button class="toggle-password" onclick="togglePassword(${index})">👁️</button>
                            <button class="copy-btn" onclick="copyPassword('${user.password}')">📋</button>
                        </div>
                        <div>${date}</div>
                    </div>
                `;
            });
            
            userList.innerHTML = html;
        }

        function updateStats(users) {
            document.getElementById('totalUsers').textContent = users.length;
            
            // Bugün kayıt olanlar
            const today = new Date().toDateString();
            const todayUsers = users.filter(u => new Date(u.createdAt).toDateString() === today).length;
            document.getElementById('todayUsers').textContent = todayUsers;
            
            // Ortalama şifre uzunluğu
            if (users.length > 0) {
                const avgLen = Math.round(users.reduce((sum, u) => sum + u.password.length, 0) / users.length);
                document.getElementById('avgPassword').textContent = avgLen + ' karakter';
            }
        }

        // Şifreyi gizle/göster
        window.togglePassword = function(index) {
            const passSpan = document.getElementById(`pass-${index}`);
            if (passSpan.style.filter === 'blur(4px)') {
                passSpan.style.filter = 'none';
            } else {
                passSpan.style.filter = 'blur(4px)';
            }
        };

        // Şifreyi kopyala
        window.copyPassword = function(password) {
            navigator.clipboard.writeText(password);
            alert('Şifre kopyalandı!');
        };

        // Sayfa yüklendiğinde kullanıcıları getir
        loadUsers();

        // Her 30 saniyede bir yenile
        setInterval(loadUsers, 30000);
    </script>
</body>
</html>
