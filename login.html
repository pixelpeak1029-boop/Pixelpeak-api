<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PixelPeak - Giriş Yap</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        body {
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.8)), 
                        url('img.JPG');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 400px;
            width: 100%;
        }

        .header {
            width: 100%;
            padding: 15px 0;
        }

        .logo {
            font-size: 42px;
            font-weight: bold;
            color: #e50914;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            margin-bottom: 15px;
            text-align: center;
        }

        .logo span {
            color: #fff;
            font-size: 20px;
            display: block;
            letter-spacing: 4px;
            margin-top: -8px;
        }

        .login-box {
            background: rgba(0, 0, 0, 0.8);
            border-radius: 8px;
            padding: 40px 40px 30px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        .login-box h1 {
            color: #fff;
            font-size: 28px;
            font-weight: 500;
            margin-bottom: 10px;
        }

        .tab-bar {
            display: flex;
            margin-bottom: 25px;
            border-bottom: 1px solid #333;
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 12px 0;
            color: #8c8c8c;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab.active {
            color: #e50914;
            border-bottom: 3px solid #e50914;
        }

        .input-group {
            margin-bottom: 16px;
        }

        .input-group input {
            width: 100%;
            height: 48px;
            padding: 14px 18px;
            background: #333;
            border: none;
            border-radius: 4px;
            color: #fff;
            font-size: 16px;
        }

        .input-group input:focus {
            background: #454545;
            outline: none;
            border-bottom: 2px solid #e50914;
        }

        .input-group input::placeholder {
            color: #8c8c8c;
        }

        .action-btn {
            width: 100%;
            height: 48px;
            background: #e50914;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin: 10px 0 15px;
            transition: background 0.3s;
        }

        .action-btn:hover {
            background: #f40612;
        }

        .remember-help {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #b3b3b3;
            font-size: 13px;
            margin-bottom: 30px;
        }

        .remember {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .remember input {
            width: 16px;
            height: 16px;
            accent-color: #e50914;
        }

        .need-help {
            color: #b3b3b3;
            text-decoration: none;
        }

        .need-help:hover {
            text-decoration: underline;
        }

        .message {
            margin: 15px 0 0;
            padding: 10px;
            border-radius: 4px;
            text-align: center;
            font-size: 14px;
            display: none;
        }

        .message.success {
            background: rgba(70, 211, 105, 0.2);
            color: #46d369;
            border: 1px solid #46d369;
        }

        .message.error {
            background: rgba(229, 9, 20, 0.2);
            color: #e50914;
            border: 1px solid #e50914;
        }

        .message.info {
            background: rgba(255, 193, 7, 0.2);
            color: #ffc107;
            border: 1px solid #ffc107;
        }

        footer {
            margin-top: 20px;
            color: #737373;
            font-size: 12px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                PIXELPEAK
                <span>streaming</span>
            </div>
        </div>

        <div class="login-box">
            <h1>Hoş Geldin</h1>
            
            <!-- Sekmeler: Giriş / Kayıt -->
            <div class="tab-bar">
                <div class="tab active" id="loginTab">Giriş Yap</div>
                <div class="tab" id="registerTab">Kayıt Ol</div>
            </div>
            
            <form id="authForm">
                <div class="input-group">
                    <input type="email" id="email" placeholder="E-posta adresin" required>
                </div>
                
                <div class="input-group">
                    <input type="password" id="password" placeholder="Şifren" required>
                </div>

                <!-- Giriş yap seçeneğinde ekstra -->
                <div id="rememberField" style="display: block;">
                    <div class="remember-help">
                        <div class="remember">
                            <input type="checkbox" id="remember">
                            <label for="remember">Beni hatırla</label>
                        </div>
                        <a href="#" class="need-help" id="needHelpLink">Yardım?</a>
                    </div>
                </div>

                <button type="submit" class="action-btn" id="actionButton">Giriş Yap</button>

                <div id="message" class="message"></div>
            </form>
        </div>

        <footer>
            © 2024 PixelPeak. Tüm hakları saklıdır.
        </footer>
    </div>

    <script>
        const API_URL = 'https://pixelpeak-api.onrender.com/api';

        // Sekme değiştirme
        const loginTab = document.getElementById('loginTab');
        const registerTab = document.getElementById('registerTab');
        const actionButton = document.getElementById('actionButton');
        const rememberField = document.getElementById('rememberField');
        const formTitle = document.querySelector('.login-box h1');
        const needHelpLink = document.getElementById('needHelpLink');

        loginTab.addEventListener('click', () => {
            loginTab.classList.add('active');
            registerTab.classList.remove('active');
            actionButton.textContent = 'Giriş Yap';
            formTitle.textContent = 'Hoş Geldin';
            rememberField.style.display = 'block';
            needHelpLink.style.display = 'inline';
        });

        registerTab.addEventListener('click', () => {
            registerTab.classList.add('active');
            loginTab.classList.remove('active');
            actionButton.textContent = 'Kayıt Ol';
            formTitle.textContent = 'Hesap Oluştur';
            rememberField.style.display = 'none';
            needHelpLink.style.display = 'none';
        });

        // Sayfa yüklendiğinde
        (function init() {
            const rememberedEmail = localStorage.getItem('pixelpeak_remembered_email');
            if (rememberedEmail) {
                document.getElementById('email').value = rememberedEmail;
                document.getElementById('remember').checked = true;
            }
        })();

        // Form gönderildiğinde
        document.getElementById('authForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const isLogin = loginTab.classList.contains('active');
            const messageDiv = document.getElementById('message');

            if (!email || !password) {
                showMessage('Lütfen email ve şifrenizi girin!', 'error');
                return;
            }

            showMessage('İşlem yapılıyor...', 'info');

            try {
                const endpoint = isLogin ? '/login' : '/register';
                const response = await fetch(`${API_URL}${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    if (isLogin) {
                        // Giriş başarılı
                        if (document.getElementById('remember').checked) {
                            localStorage.setItem('pixelpeak_remembered_email', email);
                        } else {
                            localStorage.removeItem('pixelpeak_remembered_email');
                        }

                        localStorage.setItem('pixelpeak_token', data.token);
                        localStorage.setItem('pixelpeak_user', JSON.stringify(data.user));

                        showMessage('Giriş başarılı! Yönlendiriliyorsunuz...', 'success');
                        
                        setTimeout(() => {
                            window.location.href = 'ana-sayfa.html';
                        }, 1500);
                    } else {
                        // Kayıt başarılı
                        showMessage('Kayıt başarılı! Şimdi giriş yapabilirsiniz.', 'success');
                        // 2 saniye sonra giriş sekmesine geç
                        setTimeout(() => {
                            loginTab.click();
                        }, 2000);
                    }
                } else {
                    showMessage(data.error || 'İşlem başarısız!', 'error');
                }
            } catch (error) {
                showMessage('Sunucuya bağlanılamadı!', 'error');
            }
        });

        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.style.display = 'block';
            messageDiv.className = `message ${type}`;
            messageDiv.textContent = text;
        }

        // "Need help?" linki
        needHelpLink.addEventListener('click', (e) => {
            e.preventDefault();
            alert('Test hesabı kullanabilirsiniz:\nEmail: test@test.com\nŞifre: 123456');
        });
    </script>
</body>
</html>
