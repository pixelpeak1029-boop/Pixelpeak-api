<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PixelPeak - Giriş Yap</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        body {
            /* Senin kendi resmin - img.JPG */
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.8)), 
                        url('img.JPG');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 400px;
            width: 100%;
            transform: scale(0.95);
        }

        .header {
            width: 100%;
            padding: 15px 0;
        }

        .logo {
            font-size: 42px;
            font-weight: bold;
            color: #e50914;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            margin-bottom: 15px;
            text-align: center;
        }

        .logo span {
            color: #fff;
            font-size: 20px;
            display: block;
            letter-spacing: 4px;
            margin-top: -8px;
        }

        .login-box {
            background: rgba(0, 0, 0, 0.8);
            border-radius: 8px;
            padding: 50px 50px 30px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        .login-box h1 {
            color: #fff;
            font-size: 28px;
            font-weight: 500;
            margin-bottom: 20px;
        }

        .input-group {
            margin-bottom: 14px;
        }

        .input-group input {
            width: 100%;
            height: 45px;
            padding: 14px 18px;
            background: #333;
            border: none;
            border-radius: 4px;
            color: #fff;
            font-size: 15px;
            transition: all 0.3s;
        }

        .input-group input:focus {
            background: #454545;
            outline: none;
            border-bottom: 2px solid #e50914;
        }

        .input-group input::placeholder {
            color: #8c8c8c;
        }

        .signin-btn {
            width: 100%;
            height: 45px;
            background: #e50914;
            color: #fff;
            font-size: 15px;
            font-weight: 500;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin: 20px 0 10px;
            transition: background 0.3s;
        }

        .signin-btn:hover {
            background: #f40612;
        }

        .remember-help {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #b3b3b3;
            font-size: 12px;
            margin-bottom: 40px;
        }

        .remember {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .remember input[type="checkbox"] {
            width: 14px;
            height: 14px;
            cursor: pointer;
            accent-color: #e50914;
        }

        .remember label {
            cursor: pointer;
        }

        .need-help {
            color: #b3b3b3;
            text-decoration: none;
        }

        .need-help:hover {
            text-decoration: underline;
        }

        .new-to-pixelpeak {
            color: #737373;
            font-size: 15px;
            margin-bottom: 0;
        }

        .new-to-pixelpeak a {
            color: #fff;
            text-decoration: none;
            margin-left: 5px;
        }

        .new-to-pixelpeak a:hover {
            text-decoration: underline;
        }

        footer {
            margin-top: 15px;
            color: #737373;
            font-size: 11px;
            text-align: center;
        }

        .message {
            margin-top: 10px;
            text-align: center;
            font-size: 13px;
        }

        @media (max-width: 740px) {
            .container {
                transform: scale(1);
                max-width: 350px;
            }
            
            .login-box {
                padding: 40px 30px 20px;
            }
            
            .logo {
                font-size: 36px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                PIXELPEAK
                <span>streaming</span>
            </div>
        </div>

        <div class="login-box">
            <h1>Sign In</h1>
            
            <form id="loginForm">
                <div class="input-group">
                    <input type="email" id="email" placeholder="Email or phone number" required>
                </div>
                
                <div class="input-group">
                    <input type="password" id="password" placeholder="Password" required>
                </div>

                <button type="submit" class="signin-btn">Sign In</button>

                <div class="remember-help">
                    <div class="remember">
                        <input type="checkbox" id="remember">
                        <label for="remember">Remember me</label>
                    </div>
                    <a href="#" class="need-help" id="needHelpLink">Need help?</a>
                </div>

                <div class="new-to-pixelpeak">
                    New to PixelPeak? <a href="#" id="signupLink">Sign up now</a>
                </div>

                <div id="message" class="message" style="display: none;"></div>
            </form>
        </div>

        <footer>
            © 2024 PixelPeak. All rights reserved.
        </footer>
    </div>

    <script>
    // ===== API'YE BAĞLI GİRİŞ SİSTEMİ =====
    const API_URL = 'http://localhost:3000/api';

    // Sayfa yüklendiğinde
    (function init() {
        const rememberedEmail = localStorage.getItem('pixelpeak_remembered_email');
        if (rememberedEmail) {
            document.getElementById('email').value = rememberedEmail;
            document.getElementById('remember').checked = true;
        }
    })();

    // Giriş yap
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const remember = document.getElementById('remember').checked;
        const messageDiv = document.getElementById('message');

        if (!email || !password) {
            showMessage('Lütfen email ve şifrenizi girin!', 'error');
            return;
        }

        showMessage('Giriş yapılıyor...', 'info');

        try {
            const response = await fetch(`${API_URL}/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const data = await response.json();

            if (response.ok) {
                if (remember) {
                    localStorage.setItem('pixelpeak_remembered_email', email);
                } else {
                    localStorage.removeItem('pixelpeak_remembered_email');
                }

                localStorage.setItem('pixelpeak_token', data.token);
                localStorage.setItem('pixelpeak_user', JSON.stringify(data.user));

                showMessage('Giriş başarılı! Yönlendiriliyorsunuz...', 'success');
                
                setTimeout(() => {
                    window.location.href = 'ana-sayfa.html';
                }, 1000);
            } else {
                showMessage(data.error || 'Hatalı email veya şifre!', 'error');
            }
        } catch (error) {
            showMessage('Sunucuya bağlanılamadı! API çalışıyor mu?', 'error');
        }
    });

    // Kayıt ol
    document.getElementById('signupLink').addEventListener('click', async function(e) {
        e.preventDefault();
        
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const messageDiv = document.getElementById('message');

        if (!email || !password) {
            showMessage('Kayıt olmak için email ve şifre girin!', 'error');
            return;
        }

        if (!email.includes('@') || !email.includes('.')) {
            showMessage('Geçerli bir email adresi girin!', 'error');
            return;
        }

        if (password.length < 3) {
            showMessage('Şifre en az 3 karakter olmalı!', 'error');
            return;
        }

        showMessage('Kayıt yapılıyor...', 'info');

        try {
            const response = await fetch(`${API_URL}/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const data = await response.json();

            if (response.ok) {
                showMessage('Kayıt başarılı! Şimdi giriş yapabilirsiniz.', 'success');
            } else {
                showMessage(data.error || 'Kayıt başarısız!', 'error');
            }
        } catch (error) {
            showMessage('Sunucuya bağlanılamadı! API çalışıyor mu?', 'error');
        }
    });

    // "Need help?" linki
    document.getElementById('needHelpLink').addEventListener('click', function(e) {
        e.preventDefault();
        alert('Şifrenizi mi unuttunuz?\n\nAPI çalışıyor olmalı!');
    });

    function showMessage(text, type) {
        const messageDiv = document.getElementById('message');
        messageDiv.style.display = 'block';
        
        if (type === 'error') messageDiv.style.color = '#e50914';
        else if (type === 'success') messageDiv.style.color = '#4caf50';
        else if (type === 'info') messageDiv.style.color = '#ffa500';
        
        messageDiv.textContent = text;
    }
</script>
</body>
</html>
